name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Clojure CLI
        run: |
          curl -fsSL -O https://download.clojure.org/install/linux-install-1.11.1.1413.sh
          chmod +x linux-install-1.11.1.1413.sh
          sudo ./linux-install-1.11.1.1413.sh

      - name: Run tests
        run: clojure -M:dev:test

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install documentation dependencies
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --deploy --system

      - name: Build Sphinx docs
        working-directory: docs
        run: make html

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Clojure CLI
        run: |
          curl -fsSL -O https://download.clojure.org/install/linux-install-1.11.1.1413.sh
          chmod +x linux-install-1.11.1.1413.sh
          sudo ./linux-install-1.11.1.1413.sh

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system df || true
          df -h

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | bash

      - name: Start Ollama
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 5

      - name: Pull integration model
        run: ollama pull qwen2.5:0.5b

      - name: Run integration test
        env:
          LLM_BASE_URL: http://127.0.0.1:11434/v1
          LLM_TOOL_TEST_MODEL: qwen2.5:0.5b
        run: clojure -M:dev:test-runner -m cognitect.test-runner -n llm.tool-integration-test
